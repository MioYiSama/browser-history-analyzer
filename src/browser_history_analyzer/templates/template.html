<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome 浏览历史分析报告</title>

    <!-- 在样式加载前确定主题，避免深色模式下的白屏闪烁 (FOUC) -->
    <script>
      (function () {
        try {
          var s = localStorage.getItem("bha-theme");
          var dark = s ? s === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute("data-bs-theme", dark ? "dark" : "light");
        } catch (e) {}
      })();
    </script>

    <!-- Bootstrap 5（仅样式，通过 <link> 引入；JS 全部走 importmap + ESM） -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- ESM 依赖映射：Solid.js / ECharts / TanStack Table 全部按裸模块名导入。
         注意 echarts 必须用官方预构建的 dist/echarts.esm.min.js，不能用 jsdelivr
         的 /+esm —— 后者重新打包会摇掉 ECharts 的 canvas 绘制逻辑，图表能交互
         （hover 出 tooltip）却画不出任何像素（base 层全透明）。 -->
    <script type="importmap">
      {
        "imports": {
          "solid-js": "https://cdn.jsdelivr.net/npm/solid-js@2.0.0-experimental.16/+esm",
          "@solidjs/web": "https://cdn.jsdelivr.net/npm/@solidjs/web@2.0.0-experimental.16/+esm",
          "@solidjs/html": "https://cdn.jsdelivr.net/npm/@solidjs/html@2.0.0-experimental.16/+esm",
          "echarts": "https://cdn.jsdelivr.net/npm/echarts@6/dist/echarts.esm.min.js",
          "@tanstack/table-core": "https://cdn.jsdelivr.net/npm/@tanstack/table-core@8/+esm"
        }
      }
    </script>

    <style>
      :root {
        --bg: #0f172a;
        --panel: #ffffff;
        --ink: #1e293b;
        --muted: #64748b;
        --brand: #4f46e5;
        --brand2: #06b6d4;
      }
      /* 深色模式：覆写自定义变量与表面色，Bootstrap 组件由 data-bs-theme 接管 */
      [data-bs-theme="dark"] {
        --panel: #1e293b;
        --ink: #e2e8f0;
        --muted: #94a3b8;
      }
      [data-bs-theme="dark"] body {
        background: #0b1120;
      }
      [data-bs-theme="dark"] .term-list .term {
        border-bottom-color: #334155;
      }
      [data-bs-theme="dark"] .sidebar a.nav-link:hover {
        background: #1e293b;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: #eef2f7;
        color: var(--ink);
      }
      /* 主题切换按钮 */
      .theme-toggle {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        border: none;
        border-radius: 0.75rem;
        font-size: 1.15rem;
        line-height: 1;
        padding: 0.45rem 0.7rem;
      }
      .theme-toggle:hover {
        background: rgba(255, 255, 255, 0.32);
        color: #fff;
      }
      /* 主体布局：左侧 sticky 导航 + 右侧内容 */
      .layout {
        display: flex;
        align-items: flex-start;
        gap: 1.5rem;
        max-width: 1360px;
        margin: 0 auto;
        padding: 0 12px;
      }
      .content {
        flex: 1 1 auto;
        min-width: 0;
      }
      .sidebar {
        position: sticky;
        top: 1rem;
        flex: 0 0 210px;
        align-self: flex-start;
      }
      .sidebar .nav-card {
        background: var(--panel);
        border-radius: 1rem;
        padding: 0.75rem;
        box-shadow: 0 0.125rem 0.25rem rgba(15, 23, 42, 0.08);
      }
      .sidebar .nav-card .nav-head {
        font-size: 0.7rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0.25rem 0.6rem 0.5rem;
      }
      .sidebar a.nav-link {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0.6rem;
        border-radius: 0.6rem;
        color: var(--ink);
        font-size: 0.9rem;
        font-weight: 500;
        line-height: 1.2;
        transition: background 0.15s, color 0.15s;
      }
      .sidebar a.nav-link:hover {
        background: #eef2ff;
        color: var(--brand);
      }
      .sidebar a.nav-link.active {
        background: linear-gradient(135deg, var(--brand), var(--brand2));
        color: #fff;
        box-shadow: 0 0.25rem 0.6rem rgba(79, 70, 229, 0.35);
      }
      /* 锚点定位时为顶部留出呼吸空间 */
      [data-section] {
        scroll-margin-top: 1rem;
      }
      @media (max-width: 991.98px) {
        .sidebar {
          display: none;
        }
      }
      .hero {
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 45%, #06b6d4 100%);
        color: #fff;
      }
      .hero .badge-soft {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        font-weight: 500;
      }
      .stat-card,
      .chart-card {
        border: none;
        border-radius: 1rem;
        background: var(--panel);
      }
      .stat-card .stat-value {
        font-size: 1.9rem;
        font-weight: 700;
        line-height: 1.1;
      }
      .stat-card .stat-label {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .stat-card .stat-sub {
        font-size: 0.75rem;
        color: var(--muted);
      }
      .section-title {
        font-weight: 700;
        margin: 2.5rem 0 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .section-title .bar {
        width: 4px;
        height: 1.1rem;
        border-radius: 4px;
        background: linear-gradient(180deg, var(--brand), var(--brand2));
      }
      .card-title {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      .chart-card .card-body {
        padding: 1.25rem 1.5rem;
      }
      .chart {
        width: 100%;
        height: 380px;
      }
      .chart-tall {
        height: 540px;
      }
      .chart-sm {
        height: 300px;
      }
      .chart-trend {
        height: 440px;
      }
      .term-list {
        max-height: 340px;
        overflow-y: auto;
      }
      .term-list .term {
        display: flex;
        justify-content: space-between;
        padding: 0.35rem 0.1rem;
        border-bottom: 1px dashed #e2e8f0;
        font-size: 0.9rem;
      }
      .term-list .term .cnt {
        color: var(--brand);
        font-weight: 600;
      }
      .dl-table td {
        font-size: 0.85rem;
        vertical-align: middle;
      }
      footer {
        color: var(--muted);
      }
      /* 历史明细表（TanStack Table） */
      .records-toolbar .form-control,
      .records-toolbar .form-select {
        font-size: 0.82rem;
      }
      .records-wrap {
        max-height: 640px;
        overflow: auto;
        border: 1px solid #e2e8f0;
        border-radius: 0.6rem;
      }
      [data-bs-theme="dark"] .records-wrap {
        border-color: #334155;
      }
      table.records {
        font-size: 0.82rem;
        margin: 0;
        /* 固定布局：列宽由 colgroup 决定，是拖拽调宽与 ellipsis 的前提 */
        table-layout: fixed;
      }
      table.records thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--panel);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        border-bottom: 2px solid #e2e8f0;
        user-select: none;
      }
      [data-bs-theme="dark"] table.records thead th {
        border-bottom-color: #334155;
      }
      table.records thead th.sortable {
        cursor: pointer;
      }
      table.records thead th.sortable:hover {
        color: var(--brand);
      }
      table.records td {
        vertical-align: middle;
        overflow: hidden;
      }
      table.records td.nowrap {
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      table.records .ellipsis {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* 列宽拖拽手柄 */
      table.records thead th .col-resizer {
        position: absolute;
        top: 0;
        right: 0;
        height: 100%;
        width: 7px;
        cursor: col-resize;
        user-select: none;
        touch-action: none;
      }
      table.records thead th .col-resizer:hover,
      table.records thead th .col-resizer.resizing {
        background: var(--brand);
        opacity: 0.6;
      }
      .records-info {
        font-size: 0.8rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <!-- 整个页面是一个 Solid.js 应用，渲染进此挂载点 -->
    <div id="app"></div>

    <script type="module">
      import { render } from "@solidjs/web";
      import html from "@solidjs/html";
      // 注：solid-js 2.0 取消了 onMount，且 createEffect 改为两参形式
      //   createEffect(compute, effect)
      // —— 第一个函数追踪依赖并返回值，第二个函数拿该值执行副作用。空 compute
      // 即「挂载后只跑一次」，等价于旧的 onMount。
      import {
        createSignal,
        createMemo,
        createEffect,
        onCleanup,
        For,
        Show,
      } from "solid-js";
      import * as echarts from "echarts";
      import {
        createTable,
        getCoreRowModel,
        getFilteredRowModel,
        getSortedRowModel,
        getPaginationRowModel,
      } from "@tanstack/table-core";

      // 由 Jinja2 注入的分析数据（即后端 report 字典的完整序列化）
      const REPORT = {{ chart_data | safe }};

      const PALETTE = [
        "#4f46e5", "#06b6d4", "#7c3aed", "#10b981", "#f59e0b",
        "#ef4444", "#ec4899", "#14b8a6", "#8b5cf6", "#0ea5e9", "#f97316",
      ];
      const fmt = (n) => Number(n).toLocaleString("en-US");

      // ====================================================================
      // 主题（深色 / 浅色）—— 单一 signal 驱动 <html data-bs-theme> 与所有图表
      // ====================================================================
      const initialDark = () => {
        const stored = localStorage.getItem("bha-theme");
        if (stored) return stored === "dark";
        return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      };
      const [dark, setDark] = createSignal(initialDark());

      // 注：solid-js 2.0 的 createEffect 必须在响应式 owner 下创建，模块顶层没有
      // owner，故 data-bs-theme 的同步副作用放进 App（见下）而非这里。
      const toggleTheme = () => {
        const next = !dark();
        localStorage.setItem("bha-theme", next ? "dark" : "light");
        setDark(next);
      };

      // ECharts 6 默认会给文字加一圈白色描边(halo)，在纯色卡片上反而很丑、
      // 可读性差。这里在主题层面统一关闭(textBorderWidth: 0)，并覆盖到每个
      // 文字组件——坐标轴标签 / 图例 / 标题 / 视觉映射等。系列 label 另在各
      // 图表单独关闭。
      const noStroke = { textBorderColor: "transparent", textBorderWidth: 0 };
      const makeTheme = (isDark) => {
        const ink = isDark ? "#cbd5e1" : "#1e293b";
        const axisCol = isDark ? "#475569" : "#cbd5e1";
        const split = isDark ? "#1e293b" : "#eef2f7";
        return {
          backgroundColor: "transparent",
          textStyle: { color: ink, ...noStroke },
          title: { textStyle: { color: isDark ? "#e2e8f0" : "#1e293b", ...noStroke } },
          legend: { textStyle: { color: ink, ...noStroke } },
          categoryAxis: {
            axisLine: { lineStyle: { color: axisCol } },
            axisTick: { lineStyle: { color: axisCol } },
            axisLabel: { color: ink, ...noStroke },
            nameTextStyle: { color: ink, ...noStroke },
            splitLine: { lineStyle: { color: split } },
            splitArea: isDark
              ? { areaStyle: { color: ["rgba(148,163,184,0.04)", "rgba(148,163,184,0.10)"] } }
              : {},
          },
          valueAxis: {
            axisLine: { lineStyle: { color: axisCol } },
            axisTick: { lineStyle: { color: axisCol } },
            axisLabel: { color: ink, ...noStroke },
            nameTextStyle: { color: ink, ...noStroke },
            splitLine: { lineStyle: { color: split } },
          },
          tooltip: isDark
            ? { backgroundColor: "rgba(15,23,42,0.94)", borderColor: "#334155", textStyle: { color: "#e2e8f0" } }
            : {},
          visualMap: { textStyle: { color: ink, ...noStroke } },
        };
      };
      echarts.registerTheme("bha-light", makeTheme(false));
      echarts.registerTheme("bha-dark", makeTheme(true));

      const pieBorder = (isDark) => (isDark ? "#1e293b" : "#fff");

      // ====================================================================
      // 通用图表组件：持有一个容器 ref，随主题信号整体重建并自适应窗口大小。
      //   props.cls   —— 容器 class（控制高度）
      //   props.build —— (isDark) => echarts option
      // ====================================================================
      function Chart(props) {
        // 直接返回原生 div 作为 ECharts 容器，绕开 @solidjs/html 的 ref 语义。
        // 副作用在挂载后运行，此时节点已插入文档、拿得到 CSS 高度。
        const el = document.createElement("div");
        el.className = props.cls;
        let inst = null;
        // 主题变化时销毁旧实例并以对应注册主题整体重建
        createEffect(dark, (isDark) => {
          if (inst) inst.dispose();
          inst = echarts.init(el, isDark ? "bha-dark" : "bha-light");
          inst.setOption(props.build(isDark));
        });
        const onResize = () => inst && inst.resize();
        window.addEventListener("resize", onResize);
        onCleanup(() => {
          window.removeEventListener("resize", onResize);
          if (inst) inst.dispose();
        });
        return el;
      }

      // ====================================================================
      // 各图表的 option 构建器（数据来自 REPORT）
      // ====================================================================
      const baseGrid = { left: 8, right: 44, bottom: 8, top: 28, containLabel: true };

      const cat = REPORT.categories;
      const catPieOption = (isDark) => ({
        tooltip: { trigger: "item", formatter: "{b}: {c} 时 ({d}%)" },
        legend: { type: "scroll", bottom: 0, textStyle: { fontSize: 11 } },
        color: PALETTE,
        series: [{
          type: "pie",
          radius: ["42%", "70%"],
          center: ["50%", "44%"],
          avoidLabelOverlap: true,
          itemStyle: { borderColor: pieBorder(isDark), borderWidth: 2 },
          label: { formatter: "{b}\n{d}%", fontSize: 11, textBorderWidth: 0 },
          data: cat.names.map((n, i) => ({ name: n, value: cat.hours[i] })),
        }],
      });

      const catBarOption = () => ({
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        legend: { data: ["访问次数", "有效时长(时)"], top: 0 },
        grid: baseGrid,
        xAxis: { type: "category", data: cat.names, axisLabel: { interval: 0, fontSize: 11 } },
        yAxis: [
          { type: "value", name: "次数" },
          { type: "value", name: "时长(时)" },
        ],
        series: [
          { name: "访问次数", type: "bar", data: cat.counts, itemStyle: { color: "#4f46e5", borderRadius: [4, 4, 0, 0] } },
          { name: "有效时长(时)", type: "bar", yAxisIndex: 1, data: cat.hours, itemStyle: { color: "#06b6d4", borderRadius: [4, 4, 0, 0] } },
        ],
      });

      const dv = REPORT.top_domains;
      const domainsOption = () => ({
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        grid: baseGrid,
        xAxis: { type: "value" },
        yAxis: { type: "category", data: dv.domains.slice().reverse(), axisLabel: { fontSize: 11 } },
        series: [{
          type: "bar",
          data: dv.counts.slice().reverse(),
          itemStyle: { color: "#4f46e5", borderRadius: [0, 6, 6, 0] },
          label: { show: true, position: "right", fontSize: 10, textBorderWidth: 0, formatter: (p) => fmt(p.value) },
        }],
      });

      const dh = REPORT.top_domains_hours;
      const domainsHoursOption = () => ({
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" }, valueFormatter: (v) => v + " 时" },
        grid: baseGrid,
        xAxis: { type: "value", name: "时" },
        yAxis: { type: "category", data: dh.domains.slice().reverse(), axisLabel: { fontSize: 11 } },
        series: [{
          type: "bar",
          data: dh.hours.slice().reverse(),
          itemStyle: { color: "#06b6d4", borderRadius: [0, 6, 6, 0] },
          label: { show: true, position: "right", fontSize: 10, textBorderWidth: 0, formatter: "{c}" },
        }],
      });

      const hourlyOption = () => ({
        tooltip: { trigger: "axis" },
        grid: baseGrid,
        xAxis: { type: "category", boundaryGap: false, data: Array.from({ length: 24 }, (_, i) => i + "时") },
        yAxis: { type: "value" },
        series: [{
          type: "line", smooth: true, areaStyle: { opacity: 0.25 },
          data: REPORT.hourly, itemStyle: { color: "#06b6d4" },
        }],
      });

      const wd = REPORT.weekday;
      const weekdayOption = () => ({
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        grid: baseGrid,
        xAxis: { type: "category", data: wd.weekdays },
        yAxis: { type: "value" },
        series: [{
          type: "bar",
          data: wd.counts.map((v, i) => ({
            value: v,
            itemStyle: { color: i >= 5 ? "#f59e0b" : "#4f46e5", borderRadius: [4, 4, 0, 0] },
          })),
        }],
      });

      const hm = REPORT.heatmap;
      const heatmapOption = () => ({
        tooltip: { position: "top", formatter: (p) => `${hm.weekdays[p.value[1]]} ${p.value[0]}时<br/>${fmt(p.value[2])} 次` },
        grid: { left: 8, right: 24, bottom: 84, top: 24, containLabel: true },
        xAxis: { type: "category", data: hm.hours, splitArea: { show: true } },
        yAxis: { type: "category", data: hm.weekdays, splitArea: { show: true } },
        visualMap: {
          min: 0, max: hm.max || 1, calculable: true,
          orient: "horizontal", left: "center", bottom: 20,
          itemWidth: 18, itemHeight: 160,
          inRange: { color: ["#e0f2fe", "#0284c7", "#1e3a8a"] },
        },
        series: [{
          type: "heatmap", data: hm.data, label: { show: false },
          emphasis: { itemStyle: { shadowBlur: 10, shadowColor: "rgba(0,0,0,0.4)" } },
        }],
      });

      const tr = REPORT.trend;
      const trendOption = () => ({
        tooltip: { trigger: "axis" },
        legend: { data: ["访问量", "有效时长(时)"], top: 0 },
        grid: { left: 8, right: 24, bottom: 78, top: 40, containLabel: true },
        xAxis: { type: "category", boundaryGap: false, data: tr.dates },
        yAxis: [
          { type: "value", name: "访问量" },
          { type: "value", name: "时长(时)" },
        ],
        dataZoom: [{ type: "inside" }, { type: "slider", height: 24, bottom: 20 }],
        series: [
          { name: "访问量", type: "line", smooth: true, areaStyle: { opacity: 0.2 }, data: tr.counts, itemStyle: { color: "#4f46e5" } },
          { name: "有效时长(时)", type: "line", smooth: true, yAxisIndex: 1, data: tr.hours, itemStyle: { color: "#f59e0b" } },
        ],
      });

      const du = REPORT.duration_dist;
      const durationOption = () => ({
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        grid: baseGrid,
        xAxis: { type: "category", data: du.labels, axisLabel: { interval: 0, fontSize: 10 } },
        yAxis: { type: "value" },
        series: [{
          type: "bar",
          data: du.counts,
          itemStyle: { color: "#7c3aed", borderRadius: [4, 4, 0, 0] },
        }],
      });

      const transitionOption = (isDark) => ({
        tooltip: { trigger: "item", formatter: "{b}: {c} ({d}%)" },
        color: PALETTE,
        series: [{
          type: "pie", radius: ["35%", "65%"], center: ["50%", "50%"],
          itemStyle: { borderColor: pieBorder(isDark), borderWidth: 2 },
          label: { fontSize: 10, textBorderWidth: 0 },
          data: REPORT.transitions.items,
        }],
      });

      const ns = REPORT.nav_source;
      const navOption = (isDark) => ({
        tooltip: { trigger: "item", formatter: "{b}: {c} ({d}%)" },
        color: ["#10b981", "#94a3b8"],
        series: [{
          type: "pie", radius: ["35%", "65%"], center: ["50%", "50%"],
          itemStyle: { borderColor: pieBorder(isDark), borderWidth: 2 },
          label: { fontSize: 11, textBorderWidth: 0 },
          data: [
            { name: "直接访问/地址栏", value: ns.direct },
            { name: "页面内点击", value: ns.referred },
          ],
        }],
      });

      const ww = REPORT.weekday_weekend;
      const wwKeys = Object.keys(ww);
      const wwOption = () => ({
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        legend: { top: 0 },
        grid: baseGrid,
        xAxis: { type: "category", data: wwKeys },
        yAxis: [
          { type: "value", name: "次数/天" },
          { type: "value", name: "时长/天" },
        ],
        series: [
          { name: "日均访问", type: "bar", data: wwKeys.map((k) => ww[k].avg_visits), itemStyle: { color: "#4f46e5", borderRadius: [4, 4, 0, 0] } },
          { name: "日均时长(时)", type: "bar", yAxisIndex: 1, data: wwKeys.map((k) => ww[k].avg_hours), itemStyle: { color: "#f59e0b", borderRadius: [4, 4, 0, 0] } },
        ],
      });

      const se = REPORT.search;
      const searchOption = () => {
        const n = Math.min(se.terms.length, 30);
        return {
          tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
          grid: baseGrid,
          xAxis: { type: "value" },
          yAxis: { type: "category", data: se.terms.slice(0, n).reverse(), axisLabel: { fontSize: 11 } },
          series: [{
            type: "bar",

      function Downloads() {

      // ====================================================================
      // 历史明细表：TanStack Table (table-core) 驱动，Solid 响应式渲染
      // ====================================================================
      const HEADERS = {
        ts: "时间",
        title: "标题",
        url: "网址",
        domain: "域名",
        category: "类别",
        dur: "停留(秒)",
        trans: "导航类型",
        src: "来源",
      };

      function RecordsTable() {
        const R = REPORT.records;
        if (!R || !R.rows || !R.rows.length) {
          return html`
            <div class="card chart-card shadow-sm">
              <div class="card-body">
                <table class="table table-sm records mb-0">
                  <tbody><tr><td class="text-muted text-center py-4">无历史记录</td></tr></tbody>
                </table>
              </div>
            </div>`;
        }

        const { fields, rows } = R;
        // 列式数据还原为对象数组
        const data = rows.map((row) => {
          const obj = {};
          for (let i = 0; i < fields.length; i++) obj[fields[i]] = row[i];
          return obj;
        });

        // 时间按 YYYY-MM-DD 前缀做字典序区间过滤
        const dateRangeFilter = (r, id, val) => {
          const d = String(r.getValue(id)).slice(0, 10);
          const [from, to] = val || [];
          if (from && d < from) return false;
          if (to && d > to) return false;
          return true;
        };
        const equals = (r, id, val) => r.getValue(id) === val;
        const includes = (r, id, val) =>
          String(r.getValue(id)).toLowerCase().includes(String(val).toLowerCase());

        const columns = [
          { accessorKey: "ts", size: 150, enableGlobalFilter: false, filterFn: dateRangeFilter },
          { accessorKey: "title", size: 260 }, // 唯一参与全局搜索的列
          { accessorKey: "url", size: 280, enableGlobalFilter: false },
          { accessorKey: "domain", size: 150, enableGlobalFilter: false, filterFn: includes },
          { accessorKey: "category", size: 90, enableGlobalFilter: false, filterFn: equals },
          { accessorKey: "dur", size: 80, enableGlobalFilter: false },
          { accessorKey: "trans", size: 110, enableGlobalFilter: false, filterFn: equals },
          { accessorKey: "src", size: 110, enableGlobalFilter: false, filterFn: equals },
        ];

        // 全局搜索：跨 标题 / 网址 / 域名
        const globalFilterFn = (r, _id, value) => {
          const v = String(value).toLowerCase();
          const o = r.original;
          return (
            (o.title || "").toLowerCase().includes(v) ||
            (o.url || "").toLowerCase().includes(v) ||
            (o.domain || "").toLowerCase().includes(v)
          );
        };

        // 完整初始 state：table-core 在受控模式下不会自动补全各 feature 的
        // 默认子状态，缺少 columnPinning / columnVisibility 等会导致
        // getHeaderGroups 读取 undefined.left 报错。
        let state = {
          sorting: [{ id: "ts", desc: true }],
          columnFilters: [],
          globalFilter: "",
          pagination: { pageIndex: 0, pageSize: 50 },
          columnVisibility: {},
          columnOrder: [],
          columnPinning: { left: [], right: [] },
          rowSelection: {},
          rowPinning: { top: [], bottom: [] },
          expanded: {},
          grouping: [],
          columnSizing: {},
          columnSizingInfo: {
            startOffset: null,
            startSize: null,
            deltaOffset: null,
            deltaPercentage: null,
            isResizingColumn: false,
            columnSizingStart: [],
          },
        };

        // table-core state 变化 → 通过 tick 触发 Solid 重新计算派生视图
        const [tick, setTick] = createSignal(0);
        const table = createTable({
          data,
          columns,
          state,
          globalFilterFn,
          enableSortingRemoval: false,
          enableColumnResizing: true,
          columnResizeMode: "onChange",
          defaultColumn: { minSize: 60, maxSize: 800 },
          onStateChange: (updater) => {
            state = typeof updater === "function" ? updater(state) : updater;
            table.setOptions((prev) => ({ ...prev, state }));
            setTick((t) => t + 1);
          },
          getCoreRowModel: getCoreRowModel(),
          getFilteredRowModel: getFilteredRowModel(),
          getSortedRowModel: getSortedRowModel(),
          getPaginationRowModel: getPaginationRowModel(),
          renderFallbackValue: "",
        });

        // 派生视图（读 tick() 建立依赖，state 一变即重算）
        const headers = createMemo(() => (tick(), table.getHeaderGroups()[0].headers));
        const totalSize = createMemo(() => (tick(), table.getTotalSize()));
        const pageRows = createMemo(() => (tick(), table.getRowModel().rows));
        const infoText = createMemo(() => {
          tick();
          const total = data.length;
          const filtered = table.getFilteredRowModel().rows.length;
          return `共 ${total.toLocaleString()} 条 · 筛选后 ${filtered.toLocaleString()} 条`;
        });
        const pageText = createMemo(() => {
          tick();
          const pi = table.getState().pagination.pageIndex;
          const pc = table.getPageCount();
          return `第 ${pc ? pi + 1 : 0} / ${pc} 页`;
        });
        const noPrev = createMemo(() => (tick(), !table.getCanPreviousPage()));
        const noNext = createMemo(() => (tick(), !table.getCanNextPage()));

        // 下拉选项：用真实数据去重
        const uniq = (key) => [...new Set(data.map((d) => d[key]))].sort();
        const cats = uniq("category");
        const transes = uniq("trans");
        const srcs = uniq("src");

        // 受控控件值
        const [q, setQ] = createSignal("");
        const [dom, setDom] = createSignal("");
        const [catSel, setCatSel] = createSignal("");
        const [transSel, setTransSel] = createSignal("");
        const [srcSel, setSrcSel] = createSignal("");
        const [from, setFrom] = createSignal("");
        const [to, setTo] = createSignal("");
        const [size, setSize] = createSignal("50");

        const applyDate = () =>
          table.getColumn("ts").setFilterValue(from() || to() ? [from(), to()] : undefined);

        const reset = () => {
          setQ(""); setDom(""); setCatSel(""); setTransSel(""); setSrcSel("");
          setFrom(""); setTo(""); setSize("50");
          table.resetColumnFilters();
          table.setGlobalFilter("");
          table.resetColumnSizing();
          table.setPageSize(50);
          table.setPageIndex(0);
        };

        // 单个表头单元格（排序指示 + 拖拽手柄）
        const HeaderCell = (h) => {
          const col = h.column;
          const sorted = col.getIsSorted();
          const arrow = sorted === "asc" ? " ▲" : sorted === "desc" ? " ▼" : "";
          const cls = (col.getCanSort() ? "sortable " : "") + (col.id === "dur" ? "text-end" : "");
          const resizing = table.getState().columnSizingInfo.isResizingColumn === col.id;
          return html`
            <th
              class=${cls.trim()}
              style=${`width:${h.getSize()}px`}
              onClick=${(e) => {
                if (e.target.classList.contains("col-resizer")) return;
                if (col.getCanSort()) col.toggleSorting();
              }}
            >${HEADERS[col.id] + arrow}<div
                class=${"col-resizer" + (resizing ? " resizing" : "")}
                onMouseDown=${(e) => { e.stopPropagation(); h.getResizeHandler()(e); }}
                onTouchStart=${(e) => { e.stopPropagation(); h.getResizeHandler()(e); }}
                onClick=${(e) => e.stopPropagation()}
              ></div></th>`;
        };

        return html`
          <div class="card chart-card shadow-sm">
            <div class="card-body">
              <div class="d-flex flex-wrap align-items-center justify-content-between mb-3 gap-2">
                <h5 class="card-title mb-0">全部访问记录</h5>
                <span class="records-info">${infoText}</span>
              </div>

              <div class="records-toolbar row g-2 mb-3">
                <div class="col-12 col-md-4 col-lg-3">
                  <input type="search" class="form-control form-control-sm"
                    placeholder="🔍 搜索标题 / 网址 / 域名"
                    value=${q}
                    onInput=${(e) => { setQ(e.target.value); table.setGlobalFilter(e.target.value); }} />
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                  <input type="search" class="form-control form-control-sm"
                    placeholder="按域名筛选"
                    value=${dom}
                    onInput=${(e) => { setDom(e.target.value); table.getColumn("domain").setFilterValue(e.target.value || undefined); }} />
                </div>
                <div class="col-6 col-md-2 col-lg-2">
                  <select class="form-select form-select-sm"
                    value=${catSel}
                    onChange=${(e) => { setCatSel(e.target.value); table.getColumn("category").setFilterValue(e.target.value || undefined); }}>
                    <option value="">全部类别</option>
                    <${For} each=${() => cats}>${(v) => html`<option value=${v()}>${v()}</option>`}<//>
                  </select>
                </div>
                <div class="col-6 col-md-3 col-lg-2">
                  <select class="form-select form-select-sm"
                    value=${transSel}
                    onChange=${(e) => { setTransSel(e.target.value); table.getColumn("trans").setFilterValue(e.target.value || undefined); }}>
                    <option value="">全部导航类型</option>
                    <${For} each=${() => transes}>${(v) => html`<option value=${v()}>${v()}</option>`}<//>
                  </select>
                </div>
                <div class="col-6 col-md-2 col-lg-1">
                  <select class="form-select form-select-sm"
                    value=${srcSel}
                    onChange=${(e) => { setSrcSel(e.target.value); table.getColumn("src").setFilterValue(e.target.value || undefined); }}>
                    <option value="">全部来源</option>
                    <${For} each=${() => srcs}>${(v) => html`<option value=${v()}>${v()}</option>`}<//>
                  </select>
                </div>
                <div class="col-6 col-md-3 col-lg-1">
                  <input type="date" class="form-control form-control-sm" title="起始日期"
                    value=${from}
                    onChange=${(e) => { setFrom(e.target.value); applyDate(); }} />
                </div>
                <div class="col-6 col-md-3 col-lg-1">
                  <input type="date" class="form-control form-control-sm" title="结束日期"
                    value=${to}
                    onChange=${(e) => { setTo(e.target.value); applyDate(); }} />
                </div>
              </div>

              <div class="records-wrap">
                <table class="table table-sm table-hover records mb-0" style=${() => `width:${totalSize()}px`}>
                  <colgroup>
                    <${For} each=${headers}>${(h) => html`<col style=${`width:${h().getSize()}px`} />`}<//>
                  </colgroup>
                  <thead>
                    <tr><${For} each=${headers}>${(h) => HeaderCell(h())}<//></tr>
                  </thead>
                  <tbody>
                    <${Show}
                      when=${() => pageRows().length}
                      fallback=${html`<tr><td colspan="8" class="text-muted text-center py-4">没有符合条件的记录</td></tr>`}
                    >
                      <${For} each=${pageRows}>${(r) => {
                        const o = r().original;
                        return html`
                          <tr>
                            <td class="nowrap text-muted">${o.ts}</td>
                            <td>${o.title
                              ? html`<span class="ellipsis" title=${o.title}>${o.title}</span>`
                              : html`<span class="text-muted">(无标题)</span>`}</td>
                            <td><a class="ellipsis" href=${o.url} target="_blank" rel="noopener" title=${o.url}>${o.url}</a></td>
                            <td class="nowrap">${o.domain}</td>
                            <td><span class="badge text-bg-light">${o.category}</span></td>
                            <td class="text-end">${o.dur}</td>
                            <td class="nowrap">${o.trans}</td>
                            <td class="nowrap">${o.src}</td>
                          </tr>`;
                      }}<//>
                    <//>
                  </tbody>
                </table>
              </div>

              <div class="d-flex flex-wrap align-items-center justify-content-between mt-3 gap-2">
                <div class="d-flex align-items-center gap-2">
                  <button class="btn btn-sm btn-outline-secondary" type="button" disabled=${noPrev} onClick=${() => table.setPageIndex(0)}>«</button>
                  <button class="btn btn-sm btn-outline-secondary" type="button" disabled=${noPrev} onClick=${() => table.previousPage()}>‹</button>
                  <span class="records-info">${pageText}</span>
                  <button class="btn btn-sm btn-outline-secondary" type="button" disabled=${noNext} onClick=${() => table.nextPage()}>›</button>
                  <button class="btn btn-sm btn-outline-secondary" type="button" disabled=${noNext} onClick=${() => table.setPageIndex(table.getPageCount() - 1)}>»</button>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <select class="form-select form-select-sm" style="width: auto"
                    value=${size}
                    onChange=${(e) => { setSize(e.target.value); table.setPageSize(Number(e.target.value)); }}>
                    <option value="25">25 行/页</option>
                    <option value="50">50 行/页</option>
                    <option value="100">100 行/页</option>
                    <option value="200">200 行/页</option>
                  </select>
                  <button class="btn btn-sm btn-outline-secondary" type="button" onClick=${reset}>重置筛选</button>
                </div>
              </div>
            </div>
          </div>`;
      }

      // ====================================================================
      // 顶层应用：Hero + 布局（侧边导航 + 内容）
      // ====================================================================
      function App() {
        const [active, setActive] = createSignal(NAV[0].id);

        // 主题切换：把当前明暗同步到 <html data-bs-theme>
        createEffect(dark, (isDark) => {
          document.documentElement.setAttribute("data-bs-theme", isDark ? "dark" : "light");
        });

        // 侧边栏导航高亮（scrollspy）；空 compute => 挂载后只运行一次
        createEffect(() => {}, () => {
          const sections = [...document.querySelectorAll("[data-section]")];
          if (sections.length && "IntersectionObserver" in window) {
            const visible = new Map();
            const observer = new IntersectionObserver(
              (entries) => {
                entries.forEach((e) => visible.set(e.target.id, e.intersectionRatio));
                // 选出当前可见度最高的区块作为高亮项
                let best = null, bestRatio = 0;
                visible.forEach((ratio, id) => {
                  if (ratio > bestRatio) { bestRatio = ratio; best = id; }
                });
                if (best) setActive(best);
              },
              { rootMargin: "-10% 0px -70% 0px", threshold: [0, 0.25, 0.5, 1] }
            );
            sections.forEach((s) => observer.observe(s));
            onCleanup(() => observer.disconnect());
          }
        });

        const s = REPORT.sessions;

        return html`
          ${Hero()}
          <div class="layout">
            ${Sidebar({ active })}
            <main class="content pb-5">
              ${Kpis()}

                    <h5 class="card-title">Top 域名（按访问次数）</h5>
                    ${Chart({ cls: "chart chart-tall", build: domainsOption })}

                </div>
                <div class="col-lg-6">
                  <div class="card chart-card shadow-sm"><div class="card-body">
                    <h5 class="card-title">Top 域名（按有效时长）</h5>
                    ${Chart({ cls: "chart chart-tall", build: domainsHoursOption })}
                  </div></div>
                </div>
              </div>

              <!-- 时间画像 -->
              <div id="sec-time" data-section="" class="section-title"><span class="bar"></span>时间画像</div>
              <div class="row g-4">
                <div class="col-lg-7">
                  <div class="card chart-card shadow-sm h-100"><div class="card-body">
                    <h5 class="card-title">24 小时访问分布</h5>
                    ${Chart({ cls: "chart", build: hourlyOption })}
                  </div></div>
                </div>
                <div class="col-lg-5">
                  <div class="card chart-card shadow-sm h-100"><div class="card-body">
                    <h5 class="card-title">周内分布</h5>
                    ${Chart({ cls: "chart", build: weekdayOption })}

                </div>
                <div class="col-12">

                    ${Chart({ cls: "chart chart-sm", build: durationOption })}

                  <div class="card chart-card shadow-sm"><div class="card-body">
                    <h5 class="card-title">访问来源</h5>
                    ${Chart({ cls: "chart chart-sm", build: navOption })}
                  </div></div>
                </div>
              </div>

              <!-- 工作日 vs 周末 + 会话 -->
              <div class="row g-4 mt-0">
                <div class="col-lg-6">
                  <div class="card chart-card shadow-sm h-100"><div class="card-body">
                    <h5 class="card-title">工作日 vs 周末（日均）</h5>
                    ${Chart({ cls: "chart chart-sm", build: wwOption })}
                  </div></div>
                </div>
                <div class="col-lg-6">
                  <div class="card chart-card shadow-sm h-100"><div class="card-body">
                    <h5 class="card-title">会话时长概况</h5>
                    <div class="row g-3 mt-1 text-center">
                      <div class="col-6 col-md-3">
                        <div class="stat-value text-warning">${s.count}</div>
                        <div class="stat-label">会话总数</div>
                      </div>
                      <div class="col-6 col-md-3">
                        <div class="stat-value text-primary">${s.avg_min}</div>
                        <div class="stat-label">平均时长(分)</div>
                      </div>
                      <div class="col-6 col-md-3">
                        <div class="stat-value text-info">${s.median_min}</div>
                        <div class="stat-label">中位时长(分)</div>
                      </div>
                      <div class="col-6 col-md-3">
                        <div class="stat-value text-success">${s.max_min}</div>
                        <div class="stat-label">最长(分)</div>
                      </div>
                    </div>
                    <p class="text-muted small mt-3 mb-0">
                      以 30 分钟无活动为界切分上网会话。中位时长越长，说明越偏「深度沉浸」型使用。
                    </p>
                  </div></div>
                </div>
              </div>

              <!-- 搜索词 + 下载 -->
              <div id="sec-search" data-section="" class="section-title"><span class="bar"></span>搜索与下载</div>
              <div class="row g-4">
                <div class="col-lg-7">
                  <div class="card chart-card shadow-sm h-100"><div class="card-body">
                    <h5 class="card-title">高频搜索词 Top 30</h5>
                    ${se.terms.length
                      ? Chart({ cls: "chart chart-tall", build: searchOption })
                      : html`<div class="chart chart-tall text-muted text-center pt-5">无搜索词记录</div>`}
                  </div></div>
                </div>
                <div class="col-lg-5">
                  <div class="card chart-card shadow-sm h-100"><div class="card-body">
                    <h5 class="card-title">最近下载</h5>
                    ${Downloads()}
                  </div></div>
                </div>
              </div>

              <!-- 历史明细（全量表格） -->
              <div id="sec-records" data-section="" class="section-title"><span class="bar"></span>历史明细</div>
              <div class="row g-4">
                <div class="col-12">
                  ${RecordsTable()}
                </div>
              </div>

              <footer class="text-center mt-5 small">
                由 browser-history-analyzer 生成 · 数据均在本地处理，不会上传。
              </footer>
            </main>
          </div>`;
      }

      render(App, document.getElementById("app"));
    </script>
  </body>
</html>
